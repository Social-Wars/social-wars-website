<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Social Wars</title>

    <link rel="shortcut icon" href="ID_FAVICON_URL_HERE"/>
    <link rel="icon" type="image/gif" href="ID_FAVICON_URL_HERE"/>

    <link rel="stylesheet" href="css/facebook.css"/>

    <style>

        .sw-box {
            width: 380px;
            margin: 60px auto 0 auto;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 20px;
            font-family: 'lucida grande', tahoma, verdana, arial, sans-serif;
            font-size: 13px;
        }

        .sw-logo {
            text-align: center;
            margin-bottom: 14px;
        }

        .sw-logo img {
            width: 180px;
        }

        .sw-version {
            text-align: center;
            color: #777;
            font-size: 11px;
            margin-bottom: 16px;
        }

        .sw-tabs {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 16px;
        }

        .sw-tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            cursor: pointer;
            color: #555;
            font-weight: bold;
            font-size: 13px;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .sw-tab.active {
            color: #3b5998;
            border-bottom: 3px solid #3b5998;
        }

        .sw-form {
            display: none;
        }

        .sw-form.active {
            display: block;
        }

        .sw-field {
            margin-bottom: 10px;
        }

        .sw-field label {
            display: block;
            font-weight: bold;
            margin-bottom: 3px;
            color: #333;
        }

        .sw-field input[type="email"],
        .sw-field input[type="text"],
        .sw-field textarea {
            width: 100%;
            padding: 0 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 13px;
            box-sizing: border-box;
            font-family: 'lucida grande', tahoma, verdana, arial, sans-serif;
        }

        .sw-field input[type="email"],
        .sw-field input[type="text"] {
            height: 34px;
        }

        .sw-field textarea {
            padding: 8px;
            resize: vertical;
            min-height: 80px;
        }

        .sw-field input:focus,
        .sw-field textarea:focus {
            border-color: #3b5998;
            outline: none;
        }

        .sw-pass-wrap {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 3px;
            overflow: hidden;
        }

        .sw-pass-wrap input {
            flex: 1;
            height: 34px;
            padding: 0 8px;
            border: none;
            font-size: 13px;
            outline: none;
        }

        .sw-btn {
            width: 100%;
            height: 32px;
            background: #3b5998;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .sw-btn:hover {
            background: #2d4373;
        }

        .sw-msg {
            padding: 8px 10px;
            border-radius: 3px;
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
        }

        .sw-msg.error {
            background: #fdecea;
            color: #c0392b;
            border: 1px solid #e74c3c;
            display: block;
        }

        .sw-msg.success {
            background: #eafaf1;
            color: #1e8449;
            border: 1px solid #27ae60;
            display: block;
        }

    </style>

</head>

<body class="ego_wide canvas center_fixed_width_app fbx UIPage_LoggedOut liquid hideBanner Locale_en_US">

<script>

    if (!sessionStorage.getItem('index_verified')) {

        window.location.href = 'index.html';
    }

</script>

<div class="sw-box">

    <div class="sw-logo">
        <img src="img/logo.png" alt="Social Wars"/>
    </div>

    <div class="sw-version">
        ID_GAME_VERSION
    </div>

    <div class="sw-msg" id="msgBox"></div>

    <div class="sw-tabs">

        <div
            class="sw-tab active"
            id="tabLogin"
            onclick="switchTab('login')">

            Log In

        </div>

        <div
            class="sw-tab"
            id="tabRegister"
            onclick="switchTab('register')">

            Register

        </div>

    </div>

    <div class="sw-form active" id="formLogin">

        <div class="sw-field">

            <label for="loginEmail">
                Email address
            </label>

            <input
                type="email"
                id="loginEmail"
                placeholder="Email address"
            />

        </div>

        <div class="sw-field">

            <label>
                Password
            </label>

            <div class="sw-pass-wrap">

                <input
                    type="password"
                    id="loginPass"
                    placeholder="Password"
                    maxlength="12"
                />

            </div>

        </div>

        <button class="sw-btn" id="loginBtn">
            Log In
        </button>

    </div>

    <div class="sw-form" id="formRegister">

        <div class="sw-field">

            <label for="regEmail">
                Email address
            </label>

            <input
                type="email"
                id="regEmail"
                placeholder="Email address"
            />

        </div>

        <div class="sw-field">

            <label for="regUsername">
                Username
            </label>

            <input
                type="text"
                id="regUsername"
                placeholder="Choose a username"
                maxlength="12"
            />

        </div>

        <div class="sw-field">

            <label>
                Password
            </label>

            <div class="sw-pass-wrap">

                <input
                    type="password"
                    id="regPass"
                    placeholder="Password"
                    maxlength="12"
                />

            </div>

        </div>

        <button class="sw-btn" id="registerBtn">
            Create Account
        </button>

    </div>

</div>

<script type="module">

    import {
        initializeApp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        sendEmailVerification,
        setPersistence,
        browserLocalPersistence,
        browserSessionPersistence,
        updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {

        apiKey: "ID_FIREBASE_API_KEY",

        authDomain: "ID_FIREBASE_AUTH_DOMAIN",

        projectId: "ID_FIREBASE_PROJECT_ID",

        storageBucket: "ID_FIREBASE_STORAGE_BUCKET",

        messagingSenderId: "ID_FIREBASE_SENDER_ID",

        appId: "ID_FIREBASE_APP_ID",

        measurementId: "ID_FIREBASE_MEASUREMENT_ID"
    };

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    function showMsg(text, type) {

        const box = document.getElementById('msgBox');

        box.textContent = text;

        box.className = 'sw-msg ' + type;
    }

    function switchTab(tab) {

        document.getElementById('tabLogin')
            .classList.remove('active');

        document.getElementById('tabRegister')
            .classList.remove('active');

        document.getElementById('formLogin')
            .classList.remove('active');

        document.getElementById('formRegister')
            .classList.remove('active');

        if (tab === 'login') {

            document.getElementById('tabLogin')
                .classList.add('active');

            document.getElementById('formLogin')
                .classList.add('active');

        } else {

            document.getElementById('tabRegister')
                .classList.add('active');

            document.getElementById('formRegister')
                .classList.add('active');
        }
    }

    window.switchTab = switchTab;

    document.getElementById('loginBtn')
        .addEventListener('click', async () => {

            const email = document.getElementById('loginEmail')
                .value.trim();

            const password = document.getElementById('loginPass')
                .value;

            try {

                await setPersistence(
                    auth,
                    browserLocalPersistence
                );

                await signInWithEmailAndPassword(
                    auth,
                    email,
                    password
                );

                sessionStorage.setItem(
                    'index_verified',
                    'true'
                );

                window.location.href = 'game.html';

            } catch (error) {

                showMsg(
                    'Invalid email or password.',
                    'error'
                );
            }
        });

    document.getElementById('registerBtn')
        .addEventListener('click', async () => {

            const email = document.getElementById('regEmail')
                .value.trim();

            const username = document.getElementById('regUsername')
                .value.trim();

            const password = document.getElementById('regPass')
                .value;

            try {

                const credential =
                    await createUserWithEmailAndPassword(
                        auth,
                        email,
                        password
                    );

                await updateProfile(
                    credential.user,
                    {
                        displayName: username
                    }
                );

                await sendEmailVerification(
                    credential.user
                );

                showMsg(
                    'Account created successfully.',
                    'success'
                );

                switchTab('login');

            } catch (error) {

                showMsg(
                    'Unable to create account.',
                    'error'
                );
            }
        });

</script>

</body>
</html>
